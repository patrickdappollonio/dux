name: Test

on:
  push:

# audit02 P1-R — explicit least-privilege scope (push events only need
# to read source).
permissions:
  contents: read

jobs:
  test:
    name: Test (${{ matrix.os }})
    # audit02 Phase 21 (P1-S) — push-event tests also span Linux + macOS so
    # main never carries a regression that only manifests on one kernel.
    # macOS runner billing is ~10× Linux; the matrix is intentionally lean
    # (no Rust-version cross product). Mirrors the matrix in `pr.yml`.
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-24.04, macos-14]
    runs-on: ${{ matrix.os }}
    steps:
      # audit02 P0-H — third-party actions pinned by commit SHA.
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - uses: dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9 # v1

      # audit02 P1-N — only `main` push events populate the cache.
      # Swatinem/rust-cache keys on `runner.os`, so Linux and macOS use
      # separate cache entries automatically.
      - uses: Swatinem/rust-cache@82a92a6e8fbeee089604da2575dc567ae9ddeaab # v2.7.5
        with:
          save-if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
          cache-on-failure: false

      - name: Run tests
        run: cargo test --all-features

  # audit02 P0-I — same security gate runs on push so `main` stays clean
  # even if a PR landed before the gate was added. Mirror of pr.yml's
  # `security` job; keep both in sync.
  security:
    name: Security
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - uses: dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9 # v1

      - uses: Swatinem/rust-cache@82a92a6e8fbeee089604da2575dc567ae9ddeaab # v2.7.5
        with:
          save-if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
          cache-on-failure: false

      - name: Install cargo-audit + cargo-deny
        run: cargo install --locked cargo-audit cargo-deny

      - name: cargo audit
        # Keep --ignore in sync with deny.toml [advisories].ignore.
        run: |
          cargo audit --deny warnings \
            --ignore RUSTSEC-2025-0141 \
            --ignore RUSTSEC-2024-0384

      - name: cargo deny check
        run: cargo deny --all-features check
