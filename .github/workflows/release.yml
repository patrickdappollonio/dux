name: Release

on:
  release:
    types: [created]

# audit02 P2 — never cancel an in-flight release upload; one release per tag.
concurrency:
  group: release-${{ github.event.release.tag_name }}
  cancel-in-progress: false

# audit02 P1-O — workflow-level `permissions:` removed; each job declares
# its own minimum scope below.

jobs:
  build:
    name: Build ${{ matrix.archive }}
    runs-on: ${{ matrix.runner }}
    # audit02 P0-I — `actions/attest-build-provenance` requires:
    #   id-token: write     mint the OIDC token used to sign the attestation
    #   attestations: write store the attestation against the repository
    #   contents: write     upload tarball + SBOM + SHA256SUMS to the release
    # All three must live on the SAME job (per GitHub's documentation).
    permissions:
      id-token: write
      attestations: write
      contents: write
    # audit02 Phase 21 (P1-S, P2-5) — runners pinned to specific OS
    # versions instead of `ubuntu-latest`/`macos-latest`. The `*-latest`
    # alias migrates without warning when GitHub bumps its default,
    # which has historically broken release builds (e.g. macos-latest
    # going from 13→14 changed the default arch from x86_64 to arm64).
    # Pinning gives deterministic toolchains and explicit upgrades.
    #
    # macOS runner choices:
    #   • macos-13 is Intel (x86_64); used for the x86_64-apple-darwin
    #     target so the build is native and cross-compile pitfalls
    #     (linker, framework search paths) are avoided.
    #   • macos-14 is Apple Silicon (arm64); used for the
    #     aarch64-apple-darwin target for the same reason.
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-musl
            runner: ubuntu-24.04
            archive: dux-linux-amd64.tar.gz
          - target: aarch64-unknown-linux-musl
            runner: ubuntu-24.04-arm
            archive: dux-linux-arm64.tar.gz
          - target: x86_64-apple-darwin
            runner: macos-13
            archive: dux-darwin-amd64.tar.gz
          - target: aarch64-apple-darwin
            runner: macos-14
            archive: dux-darwin-arm64.tar.gz

    steps:
      # audit02 P0-H — third-party actions pinned by commit SHA. The
      # `# vX.Y.Z` comment stays so future updates remain readable, and
      # dependabot (Phase 24) keeps the SHAs fresh.
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Install musl tools
        if: contains(matrix.target, 'musl')
        run: sudo apt-get update && sudo apt-get install -y musl-tools

      # macOS runners ship with BSD tar; reproducible-tar flags need GNU
      # tar (audit02 P0-I §7.7 footnote). Install gnu-tar and prefer
      # `gtar` for the package step.
      - name: Install GNU tar (macOS)
        if: contains(matrix.runner, 'macos')
        run: brew install gnu-tar

      # Toolchain channel comes from rust-toolchain.toml at repo root
      # (audit02 6.2 — deterministic version, no `stable` drift).
      - uses: dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9 # v1
        with:
          targets: ${{ matrix.target }}

      # audit02 P1-N — release builds run on push events to release tags
      # only, so populating the cache here is safe.
      - uses: Swatinem/rust-cache@82a92a6e8fbeee089604da2575dc567ae9ddeaab # v2.7.5
        with:
          key: ${{ matrix.target }}
          save-if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
          cache-on-failure: false

      - name: Install cargo-edit
        run: cargo install cargo-edit --locked

      # audit02 P0-I — cargo-auditable embeds the dependency tree in the
      # binary so post-publication scans (`cargo audit bin`, trivy, grype)
      # can re-check release artefacts. ~4 KB overhead.
      - name: Install cargo-auditable
        run: cargo install --locked cargo-auditable

      # audit02 P0-I — cargo-cyclonedx generates a CycloneDX SBOM per
      # build target. Limitation: bundled C/C++ deps (rusqlite's vendored
      # SQLite) are not enumerated; downstream consumers should treat the
      # SBOM as Rust-deps-only.
      - name: Install cargo-cyclonedx
        run: cargo install --locked cargo-cyclonedx

      - name: Set version from tag
        run: |
          VERSION="${{ github.event.release.tag_name }}"
          VERSION="${VERSION#v}"
          cargo set-version "$VERSION"

      # audit02 P0-I §7.3 — replaces plain `cargo build --release`. The
      # produced binary is byte-compatible (same compiler flags) but
      # carries an embedded `.dep-v0` section.
      - name: Build (auditable)
        run: cargo auditable build --release --target ${{ matrix.target }}

      - name: Strip binary
        run: strip target/${{ matrix.target }}/release/dux

      # audit02 P0-I §7.4 — SBOM filename includes the matrix target so
      # all four end up in the release alongside the tarballs. The
      # `--override-filename` flag tells cargo-cyclonedx to write
      # `sbom-<target>.cdx.json` next to Cargo.toml.
      - name: Generate SBOM
        run: |
          cargo cyclonedx --format json --override-filename "sbom-${{ matrix.target }}.cdx"
          ls -la sbom-*.cdx.json

      # audit02 P0-I §7.7 — reproducible tar so two reruns of the same
      # tag produce byte-identical archives. `--mtime=@<release.created_at>`
      # pins the timestamp to the release event time (stable across reruns
      # of the same release). GNU tar required (`gtar` on macOS).
      - name: Package (reproducible)
        run: |
          if command -v gtar >/dev/null 2>&1; then TAR=gtar; else TAR=tar; fi
          "$TAR" --sort=name --owner=0 --group=0 --numeric-owner \
            --mtime='@${{ github.event.release.created_at }}' \
            -czf "${{ matrix.archive }}" \
            -C "target/${{ matrix.target }}/release" dux

      # audit02 P0-I §7.5 — OIDC-keyless build provenance attestation.
      # Verifiable downstream via:
      #   gh attestation verify dux-linux-amd64.tar.gz --owner <owner>
      # Subject covers both the tarball and the per-target SBOM.
      - name: Attest build provenance
        uses: actions/attest-build-provenance@e8998f949152b193b063cb0ec769d69d929409be # v2.4.0
        with:
          subject-path: |
            ${{ matrix.archive }}
            sbom-${{ matrix.target }}.cdx.json

      - name: Upload tarball + SBOM to release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release upload "${{ github.event.release.tag_name }}" \
            "${{ matrix.archive }}" \
            "sbom-${{ matrix.target }}.cdx.json" \
            --clobber

  upload-install-script:
    name: Upload install script
    # audit02 Phase 21 (P2-5) — pinned OS version (no `*-latest` drift).
    runs-on: ubuntu-24.04
    permissions:
      contents: write    # upload install.sh asset
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - name: Upload install script
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release upload ${{ github.event.release.tag_name }} install.sh

  # audit02 P0-I §7.6 — generate SHA256SUMS over the now-uploaded tarballs
  # so users (and `dux-amq/install.sh`'s pinned hash) can verify integrity
  # with `curl -fsSL .../SHA256SUMS | sha256sum -c -`.
  # Runs after `build` has uploaded every per-target tarball.
  sha256sums:
    name: SHA256SUMS
    runs-on: ubuntu-24.04
    needs: [build]
    permissions:
      contents: write    # upload SHA256SUMS asset
    steps:
      - name: Download tarballs from release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          mkdir -p dist
          # The `--pattern '*.tar.gz'` filter restricts download to the
          # binary archives — SBOMs are JSON and excluded.
          gh release download "${{ github.event.release.tag_name }}" \
            --repo "${{ github.repository }}" \
            --pattern '*.tar.gz' \
            --dir dist

      - name: Generate SHA256SUMS
        run: |
          cd dist
          # `sha256sum` already produces `<hash>  <filename>` (two spaces),
          # the format expected by `sha256sum -c -`. Sort for determinism.
          sha256sum *.tar.gz | LC_ALL=C sort > SHA256SUMS
          cat SHA256SUMS

      - name: Upload SHA256SUMS
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release upload "${{ github.event.release.tag_name }}" \
            dist/SHA256SUMS --clobber

  update-release-notes:
    name: Append install instructions
    # audit02 Phase 21 (P2-5) — pinned OS version (no `*-latest` drift).
    runs-on: ubuntu-24.04
    permissions:
      contents: write    # edit release body
    # Wait for SHA256SUMS so the rendered release body never references
    # an asset that hasn't landed yet.
    needs: [build, upload-install-script, sha256sums]
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Append install section to release notes
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # Extract the Install section body from README
          # (between "## Install" and next "## ", excluding both headings)
          install_section=$(sed -n '/^## Install$/,/^## /{/^## /d; p}' README.md | sed -e :a -e '/^\n*$/{$d;N;ba;}')

          # Get current release body
          current_body=$(gh release view "${{ github.event.release.tag_name }}" --json body -q '.body')

          # Split at "Full Changelog" line and reassemble
          if echo "$current_body" | grep -q '^\*\*Full Changelog\*\*'; then
            before=$(echo "$current_body" | sed '/^\*\*Full Changelog\*\*/,$d' | sed -e :a -e '/^\n*$/{$d;N;ba;}')
            changelog_line=$(echo "$current_body" | grep '^\*\*Full Changelog\*\*')
            new_body="${before}

          ---

          ## Installation

          Use any of the following options to install dux on your system:

          ${install_section}

          ${changelog_line}"
          else
            # No Full Changelog line — just append
            new_body="${current_body}

          ---

          ## Installation

          Use any of the following options to install dux on your system:

          ${install_section}"
          fi

          gh release edit "${{ github.event.release.tag_name }}" --notes "$new_body"
