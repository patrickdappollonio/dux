name: PR

on:
  pull_request:

# audit02 P1-R — default-deny so fork PRs cannot escalate.
permissions:
  contents: read

concurrency:
  group: pr-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  fmt:
    name: Format
    # audit02 Phase 21 (P1-S) — fmt is platform-agnostic; one Linux runner
    # is sufficient. Clippy/test cover both OSes via the matrix below.
    runs-on: ubuntu-24.04
    steps:
      # audit02 P0-H — third-party actions pinned by commit SHA.
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - uses: dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9 # v1
        with:
          toolchain: "1.88.0"
          components: rustfmt

      - name: Check formatting
        run: cargo fmt --check

  clippy:
    name: Clippy (${{ matrix.os }})
    # audit02 Phase 21 (P1-S) — clippy runs on Linux and macOS so
    # platform-specific lints (`#[cfg(target_os = "macos")]` blocks,
    # `os::unix` divergences) surface in CI rather than at release time.
    # macOS runner billing is ~10× Linux; the matrix is intentionally
    # kept to two OSes (no Rust-version cross product).
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-24.04, macos-14]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - uses: dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9 # v1
        with:
          toolchain: "1.88.0"
          components: clippy

      # audit02 P1-N — only `main` push events populate the cache; PR
      # forks read but never write. `cache-on-failure: false` prevents
      # poisoned caches from a clippy build that crashed mid-flight.
      # The cache key is per-OS because Swatinem/rust-cache automatically
      # incorporates `runner.os`, so Linux and macOS get separate caches.
      - uses: Swatinem/rust-cache@82a92a6e8fbeee089604da2575dc567ae9ddeaab # v2.7.5
        with:
          save-if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
          cache-on-failure: false

      - name: Run clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

  test:
    name: Test (${{ matrix.os }})
    # audit02 Phase 21 (P1-S) — tests run on Linux and macOS so unit
    # tests gated by `#[cfg(unix)]` (e.g. non-UTF-8 path handling in
    # `tests/git_portability.rs`) exercise both kernels.
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-24.04, macos-14]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - uses: dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9 # v1
        with:
          toolchain: "1.88.0"

      - uses: Swatinem/rust-cache@82a92a6e8fbeee089604da2575dc567ae9ddeaab # v2.7.5
        with:
          save-if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
          cache-on-failure: false

      - name: Run tests
        run: cargo test --all-features

  # audit02 P0-I — supply-chain advisory + license + source gating.
  # `cargo audit --deny warnings` fails on any unaddressed RUSTSEC entry
  # (transitive ignores live in deny.toml's [advisories.ignore]; mirrored
  # via --ignore here so both tools agree).
  # `cargo deny check` enforces deny.toml — yanked, license allowlist,
  # multiple-versions, and crates.io-only sources.
  security:
    name: Security
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    steps:
      # audit02 P0-H — third-party actions pinned by commit SHA.
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - uses: dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9 # v1
        with:
          toolchain: "1.88.0"

      # audit02 P1-N — security tooling caches (cargo-audit, cargo-deny
      # builds) write only on main pushes; PR forks read but never write.
      - uses: Swatinem/rust-cache@82a92a6e8fbeee089604da2575dc567ae9ddeaab # v2.7.5
        with:
          save-if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
          cache-on-failure: false

      - name: Install cargo-audit + cargo-deny
        run: cargo install --locked cargo-audit cargo-deny

      - name: cargo audit
        # Keep --ignore in sync with deny.toml [advisories].ignore. cargo-audit
        # does not auto-read deny.toml, so the IDs are spelled out here.
        run: |
          cargo audit --deny warnings \
            --ignore RUSTSEC-2025-0141 \
            --ignore RUSTSEC-2024-0384

      - name: cargo deny check
        run: cargo deny --all-features check
