<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#07070d"/>
      <stop offset="100%" stop-color="#11111d"/>
    </linearGradient>
    <radialGradient id="glow1" cx="0.15" cy="0.1" r="0.7">
      <stop offset="0%" stop-color="#00d4ff" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#00d4ff" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="0.9" cy="0.95" r="0.6">
      <stop offset="0%" stop-color="#ff4fd8" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#ff4fd8" stop-opacity="0"/>
    </radialGradient>
    <pattern id="grid" x="0" y="0" width="44" height="44" patternUnits="userSpaceOnUse">
      <path d="M 44 0 L 0 0 0 44" fill="none" stroke="#1c1f36" stroke-width="1"/>
    </pattern>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#grid)"/>
  <rect width="1200" height="630" fill="url(#glow1)"/>
  <rect width="1200" height="630" fill="url(#glow2)"/>

  <!-- pill -->
  <g transform="translate(80,90)">
    <rect width="220" height="36" rx="18" fill="#11111d" stroke="#2a2e4c"/>
    <circle cx="20" cy="18" r="4" fill="#4ade80"/>
    <text x="34" y="23" font-family="'JetBrains Mono', monospace" font-size="14" fill="#aab2d5">getdux.app · macOS + Linux</text>
  </g>

  <!-- headline -->
  <g font-family="'JetBrains Mono', ui-monospace, monospace" fill="#f4f7ff">
    <text x="80" y="220" font-size="76" font-weight="700">Your AI agents</text>
    <text x="80" y="310" font-size="76" font-weight="700">deserve a <tspan fill="#00d4ff">proper office</tspan>.</text>
  </g>

  <!-- subtitle -->
  <text x="80" y="370" font-family="'Inter', sans-serif" font-size="26" fill="#aab2d5">
    Run multiple Claude Code, Codex, and Gemini agents in parallel,
  </text>
  <text x="80" y="405" font-family="'Inter', sans-serif" font-size="26" fill="#aab2d5">
    one git worktree each. Real CLIs in real terminals.
  </text>

  <!-- install command -->
  <g transform="translate(80,470)">
    <rect width="980" height="80" rx="12" fill="#11111d" stroke="#2a2e4c"/>
    <text x="24" y="50" font-family="'JetBrains Mono', monospace" font-size="22" fill="#00d4ff">$</text>
    <text x="48" y="50" font-family="'JetBrains Mono', monospace" font-size="22" fill="#f4f7ff">curl -sSfL https://getdux.app/install.sh | bash</text>
  </g>

  <!-- monogram bottom right -->
  <g transform="translate(1010,80)">
    <rect width="110" height="110" rx="22" fill="#11111d" stroke="#2a2e4c" stroke-width="1.5"/>
    <text x="55" y="80" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-weight="700" font-size="70" fill="#00d4ff">d</text>
    <circle cx="92" cy="22" r="6" fill="#ff4fd8"/>
  </g>

  <!-- bottom strip -->
  <text x="80" y="590" font-family="'JetBrains Mono', monospace" font-size="14" fill="#6f7899">
    no protocol layers · no adapters · no JSON-RPC · just PTYs
  </text>
</svg>
