<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>dux — transport smoke test</title>
  <style>
    :root { color-scheme: dark; }
    body { margin: 0; font: 13px ui-monospace, SFMono-Regular, Menlo, monospace; background: #0f1116; color: #c9d1d9; }
    header { display: flex; align-items: center; gap: 12px; padding: 8px 14px; background: #161a22; border-bottom: 1px solid #2a2f3a; }
    header .brand { color: #7aa2f7; font-weight: 700; }
    header .status { margin-left: auto; color: #6e7681; }
    .cols { display: flex; height: calc(100vh - 41px); }
    .pane { padding: 10px 14px; overflow: auto; }
    .left { width: 38%; border-right: 1px solid #20242e; }
    .right { flex: 1; display: flex; flex-direction: column; }
    h2 { font-size: 11px; text-transform: uppercase; letter-spacing: .06em; color: #6e7681; margin: 0 0 8px; }
    .session { display: flex; align-items: center; gap: 8px; padding: 4px 0; }
    .session button, .bar button { background: #1f6feb22; color: #adbac7; border: 1px solid #2a2f3a; border-radius: 6px; padding: 2px 9px; cursor: pointer; font: inherit; }
    .session button:hover, .bar button:hover { background: #1f6feb44; color: #fff; }
    pre { white-space: pre-wrap; word-break: break-word; margin: 0; }
    #vm { color: #8b949e; font-size: 12px; }
    #term { flex: 1; background: #0b0d12; border: 1px solid #20242e; border-radius: 7px; padding: 8px; overflow: auto; }
    .bar { display: flex; gap: 8px; padding: 8px 0 0; }
    .bar input { flex: 1; background: #0b0d12; color: #c9d1d9; border: 1px solid #2a2f3a; border-radius: 6px; padding: 5px 9px; font: inherit; }
    #log { color: #6e7681; font-size: 11px; padding: 6px 14px; border-top: 1px solid #20242e; max-height: 90px; overflow: auto; }
  </style>
</head>
<body>
  <header>
    <span class="brand">dux</span>
    <span>web transport smoke test</span>
    <span class="status" id="conn">connecting…</span>
  </header>
  <div class="cols">
    <div class="pane left">
      <h2>Sessions</h2>
      <div id="sessions"></div>
      <div class="bar"><button id="toggle">Toggle auto-reopen on first session</button></div>
      <h2 style="margin-top:16px">ViewModel</h2>
      <pre id="vm">(waiting)</pre>
    </div>
    <div class="pane right">
      <h2>Terminal (subscribed PTY)</h2>
      <pre id="term"></pre>
      <div class="bar">
        <input id="input" placeholder="type, then Enter — bytes go to the PTY" autocomplete="off" />
      </div>
    </div>
  </div>
  <div id="log"></div>

  <script>
    const ws = new WebSocket("ws://" + location.host + "/ws");
    ws.binaryType = "arraybuffer";
    const $ = (id) => document.getElementById(id);
    const decoder = new TextDecoder();
    const encoder = new TextEncoder();
    let sessions = [];

    function log(msg) {
      const el = $("log");
      el.textContent = (msg + "\n" + el.textContent).slice(0, 4000);
    }

    function renderSessions() {
      const host = $("sessions");
      host.replaceChildren();
      if (sessions.length === 0) { host.textContent = "(no sessions)"; return; }
      for (const s of sessions) {
        const row = document.createElement("div");
        row.className = "session";
        const label = document.createElement("span");
        label.textContent = (s.title || s.id) + " · " + s.branch_name +
          (s.auto_reopen_enabled ? " · auto-reopen" : "");
        const btn = document.createElement("button");
        btn.textContent = "Stream";
        btn.onclick = () => ws.send(JSON.stringify({ type: "subscribe", session_id: s.id }));
        row.append(label, btn);
        host.append(row);
      }
    }

    ws.onopen = () => { $("conn").textContent = "● connected"; };
    ws.onclose = () => { $("conn").textContent = "○ disconnected"; };

    ws.onmessage = (ev) => {
      if (ev.data instanceof ArrayBuffer) {
        $("term").textContent += decoder.decode(new Uint8Array(ev.data));
        $("term").scrollTop = $("term").scrollHeight;
        return;
      }
      let msg;
      try { msg = JSON.parse(ev.data); } catch { return; }
      switch (msg.type) {
        case "view_model":
          sessions = (msg.data && msg.data.sessions) || [];
          $("vm").textContent = JSON.stringify(msg.data, null, 2);
          renderSessions();
          break;
        case "command_result":
          log(msg.error ? ("command error: " + msg.error)
                        : ("command ok: " + (msg.status ? msg.status.message : "done")));
          break;
        case "subscribed":
          log("subscribed to " + msg.session_id);
          break;
        case "error":
          log("error: " + msg.message);
          break;
      }
    };

    $("input").addEventListener("keydown", (e) => {
      if (e.key === "Enter") {
        ws.send(encoder.encode($("input").value + "\n"));
        $("input").value = "";
        e.preventDefault();
      }
    });

    $("toggle").onclick = () => {
      if (sessions.length === 0) { log("no session to toggle"); return; }
      const s = sessions[0];
      ws.send(JSON.stringify({
        type: "command",
        command: "toggle_agent_auto_reopen",
        args: { session_id: s.id, enabled: !s.auto_reopen_enabled },
      }));
    };
  </script>
</body>
</html>
