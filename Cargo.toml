[workspace]
resolver = "3"
members = ["crates/dux", "crates/dux-remote", "crates/dux-web-browser"]
# dux-web-browser only builds for wasm32-unknown-unknown. Keep it out of the
# default set so `cargo build --workspace` on a native host stays green;
# build it explicitly with `cargo build -p dux-web-browser --target
# wasm32-unknown-unknown --no-default-features` (or via wasm-pack).
default-members = ["crates/dux", "crates/dux-remote"]

[profile.release]
opt-level = "z"   # Optimize for size.
lto = true        # Enable link time optimization.
codegen-units = 1 # Reduce parallel code generation units.
debug = 0         # No debug information
# Abort on panic — the native TUI has a panic hook at main.rs and app/mod.rs
# that restores terminal state before the process dies, and the WASM crate
# never relies on unwinding.  Drops panic-formatting code from both binaries
# and shrinks the WASM .wasm output by several hundred KB.
panic = "abort"
strip = "symbols" # Drop debug symbols + name section at link time.

[profile.profiling]
inherits = "release"
opt-level = 2     # Full speed optimizations (not size-optimized).
debug = 2         # Full debug info for symbols in flamegraphs.
strip = false     # Keep symbols intact for profilers.
lto = false       # Disable LTO so builds are faster during profiling.
