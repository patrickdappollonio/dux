[package]
name = "dux"
version = "0.1.0"
edition = "2024"

[dependencies]
anyhow = "1.0.98"
chrono = { version = "0.4.41", features = ["serde"] }
crossterm = "0.29.0"
home = "0.5.11"
ratatui = "0.29.0"
rusqlite = { version = "0.37.0", features = ["bundled", "chrono"] }
serde = { version = "1.0.219", features = ["derive"] }
serde_json = "1.0.140"
toml = "0.8.20"
uuid = { version = "1.17.0", features = ["v4"] }

[dev-dependencies]
tempfile = "3.20.0"
